name: Deploy backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            deegot/gotback:latest
            deegot/gotback:${{ github.sha }}

      - uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -H "${{ secrets.VM_TAILSCALE_IP }}" >> "$HOME/.ssh/known_hosts"

      - name: Restart backend
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/id_ed25519" \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_TAILSCALE_IP }}" \
            "kubectl rollout restart deployment/backend-deployment && kubectl rollout status deployment/backend-deployment"
